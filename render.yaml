# Render.com deployment configuration
services:
  - type: web
    name: looporb-api
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: looporb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://looporb.vercel.app
      - key: NEXT_PUBLIC_API_URL
        value: https://looporb-api.onrender.com/api
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: looporb-db
    databaseName: looporb
    user: looporb
    plan: free
